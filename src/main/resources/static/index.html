<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympus Pass | Acesso</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="auth-container">
        <h2 id="formTitle">Olympus Pass</h2>
        
        <div id="loginView">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Seu e-mail de treino" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Sua senha" required>
                        <button type="button" class="toggle-password" data-target="password" title="Mostrar senha" aria-label="Mostrar senha">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                        </button>
                    </div>
                    <p id="loginPasswordError" class="error-msg hidden"></p>
                </div>
                
                <button type="submit" class="btn-submit">Entrar no Olimpo</button>
            </form>

            <div class="toggle-link">
                Ainda não tem o passe? <a href="#" id="showRegister">Cadastre-se</a>
            </div>
        </div>

        <div id="registerView" class="hidden">
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" placeholder="Seu nome" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="Seu e-mail de treino" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres e 1 maiúscula" required>
                        <button type="button" class="toggle-password" data-target="reg-password" title="Mostrar senha" aria-label="Mostrar senha">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                        </button>
                    </div>
                    <p id="regPasswordError" class="error-msg hidden"></p>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" placeholder="Repita a senha" required>
                        <button type="button" class="toggle-password" data-target="confirm-password" title="Mostrar senha" aria-label="Mostrar senha">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                        </button>
                    </div>
                    <p id="confirmError" class="error-msg hidden"></p>
                </div>

                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>

            <div class="toggle-link">
                Já tem o passe? <a href="#" id="showLogin">Faça Login</a>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
