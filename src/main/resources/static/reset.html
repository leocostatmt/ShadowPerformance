<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Performance | Redefinir Senha</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png?v=2">
    <link rel="icon" type="image/png" sizes="64x64" href="images/favicon.png?v=2">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="auth-container">
        <h2 id="formTitle">Nova Senha</h2>

        <div id="successView" class="hidden fade">
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <h3>Senha Atualizada!</h3>
            <p id="successMessageText">Sua nova senha foi gravada com sucesso.</p>
            <div class="redirect-box">
                Retornando ao login em <span id="countdown">3</span>s...
            </div>
        </div>
        
        <div id="resetFormView">
            <form id="resetForm">
                
                <p id="resetGlobalMessage" class="error-msg hidden" style="margin-bottom: 15px; font-size: 14px;"></p>

                <div class="form-group">
                    <label for="new-password">Nova Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="new-password" placeholder="Mínimo 8 caracteres e 1 maiúscula" required>
                        <button type="button" class="toggle-password" data-target="new-password" title="Mostrar senha" aria-label="Mostrar senha">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                        </button>
                    </div>
                    
                    <div id="password-rules" class="password-rules">
                        <p>A sua nova senha deve conter:</p>
                        <ul>
                            <li id="rule-length" class="invalid">Mínimo de 8 caracteres</li>
                            <li id="rule-uppercase" class="invalid">Pelo menos 1 letra maiúscula</li>
                            <li id="rule-number" class="invalid">Pelo menos 1 número</li>
                        </ul>
                    </div>
                    <p id="passwordError" class="error-msg hidden"></p>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Nova Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" placeholder="Repita a nova senha" required>
                        <button type="button" class="toggle-password" data-target="confirm-password" title="Mostrar senha" aria-label="Mostrar senha">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                        </button>
                    </div>
                    <p id="confirmError" class="error-msg hidden"></p>
                </div>

                <button type="submit" id="btnSubmitReset" class="btn-submit">Alterar Senha</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. CAPTURA O TOKEN DIRETAMENTE DA URL (?token=xyz)
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const resetFormView = document.getElementById('resetFormView');
            const resetGlobalMessage = document.getElementById('resetGlobalMessage');
            const formTitle = document.getElementById('formTitle');
            const newPasswordInput = document.getElementById('new-password');
            const confirmPasswordInput = document.getElementById('confirm-password');
            const passwordRulesDiv = document.getElementById('password-rules');

            // Validações Visuais Dinâmicas
            const ruleLength = document.getElementById('rule-length');
            const ruleUppercase = document.getElementById('rule-uppercase');
            const ruleNumber = document.getElementById('rule-number');

            // Se abrir a página sem um token válido na URL, bloqueia o formulário
            if (!token) {
                resetGlobalMessage.textContent = "❌ Link de acesso inválido. Solicite uma nova recuperação.";
                resetGlobalMessage.style.color = '#ff4d4d';
                resetGlobalMessage.classList.remove('hidden');
                document.getElementById('resetForm').style.opacity = '0.3';
                document.getElementById('btnSubmitReset').disabled = true;
                return;
            }

            // Exibir as regras ao focar no campo
            newPasswordInput.addEventListener('focus', () => {
                passwordRulesDiv.style.display = 'block';
            });

            // Monitorar digitação (Validação em tempo real)
            newPasswordInput.addEventListener('input', () => {
                const valor = newPasswordInput.value;
                resetGlobalMessage.classList.add('hidden');
                newPasswordInput.style.borderColor = '';

                if (valor.length >= 8) ruleLength.className = 'valid'; else ruleLength.className = 'invalid';
                if (/[A-Z]/.test(valor)) ruleUppercase.className = 'valid'; else ruleUppercase.className = 'invalid';
                if (/[0-9]/.test(valor)) ruleNumber.className = 'valid'; else ruleNumber.className = 'invalid';
            });

            confirmPasswordInput.addEventListener('input', () => {
                document.getElementById('confirmError').classList.add('hidden');
                confirmPasswordInput.style.borderColor = '';
            });

            // SUBMISSÃO DO FORMULÁRIO PARA O JAVA
            document.getElementById('resetForm').addEventListener('submit', (event) => {
                event.preventDefault();

                const novaSenha = newPasswordInput.value;
                const confirmacao = confirmPasswordInput.value;

                // Validação de Segurança antes do Envio
                const valido = novaSenha.length >= 8 && /[A-Z]/.test(novaSenha) && /[0-9]/.test(novaSenha);
                if (!valido) {
                    resetGlobalMessage.textContent = "A senha não cumpre os requisitos de segurança.";
                    resetGlobalMessage.classList.remove('hidden');
                    newPasswordInput.style.borderColor = '#ff4d4d';
                    return;
                }

                if (novaSenha !== confirmacao) {
                    document.getElementById('confirmError').textContent = "As senhas não coincidem.";
                    document.getElementById('confirmError').classList.remove('hidden');
                    confirmPasswordInput.style.borderColor = '#ff4d4d';
                    return;
                }

                const btnSubmit = document.getElementById('btnSubmitReset');
                btnSubmit.textContent = 'Gravando...';
                btnSubmit.disabled = true;

                // Dispara o POST para o Endpoint /api/redefinir-senha do seu AuthController
                fetch('http://localhost:8080/api/redefinir-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, novaSenha: novaSenha })
                })
                .then(async resposta => {
                    const mensagem = await resposta.text();
                    if (resposta.ok) {
                        // SUCESSO: Oculta o form e mostra o painel animado de contagem regressiva
                        resetFormView.classList.add('hidden');
                        formTitle.classList.add('hidden');
                        
                        const successView = document.getElementById('successView');
                        const countdownElement = document.getElementById('countdown');
                        document.getElementById('successMessageText').textContent = mensagem;
                        successView.classList.remove('hidden');

                        let segundos = 3;
                        countdownElement.textContent = segundos;
                        const timer = setInterval(() => {
                            segundos--;
                            countdownElement.textContent = segundos;
                            if (segundos <= 0) {
                                clearInterval(timer);
                                window.location.href = 'index.html'; // Redireciona de volta ao Login
                            }
                        }, 1000);
                    } else {
                        // Erro retornado pelo Java (Token expirado ou inválido)
                        resetGlobalMessage.textContent = "❌ " + mensagem;
                        resetGlobalMessage.classList.remove('hidden');
                        btnSubmit.textContent = 'Alterar Senha';
                        btnSubmit.disabled = false;
                    }
                })
                .catch(erro => {
                    console.error(erro);
                    resetGlobalMessage.textContent = "Erro ao conectar com a oficina.";
                    resetGlobalMessage.classList.remove('hidden');
                    btnSubmit.textContent = 'Alterar Senha';
                    btnSubmit.disabled = false;
                });
            });

            // Lógica de Visualizar Senha (Olho)
            const togglePasswordBtns = document.querySelectorAll('.toggle-password');
            const iconeOlhoAberto = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
            const iconeOlhoFechado = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;

            togglePasswordBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    const inputElement = document.getElementById(targetId);
                    if (inputElement.type === 'password') {
                        inputElement.type = 'text';
                        this.innerHTML = iconeOlhoAberto;
                    } else {
                        inputElement.type = 'password';
                        this.innerHTML = iconeOlhoFechado;
                    }
                });
            });
        });
    </script>
</body>
</html>
