spring.application.name=javaproject
server.port=8080

# Conexão com o PostgreSQL (porta padrão 5432)
spring.datasource.url=jdbc:postgresql://localhost:5432/shadowperformance
spring.datasource.username=postgres
spring.datasource.password=root

# Configurações do Hibernate (cria as tabelas automaticamente)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
